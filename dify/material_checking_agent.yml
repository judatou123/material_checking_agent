    - data:
        code: "import json\nimport re\n\ndef main(raw_json) -> dict:\n    # 解析输入 →\
          \ 拿到单个 dict\n    data = {}\n    if isinstance(raw_json, dict):\n       \
          \ data = raw_json\n    elif isinstance(raw_json, list) and raw_json:\n \
          \       # 兼容：LLM 不听话输出了数组，取第一个\n        data = raw_json[0] if isinstance(raw_json[0],\
          \ dict) else {}\n    elif isinstance(raw_json, str) and raw_json.strip():\n\
          \        cleaned = re.sub(r'<think>.*?</think>', '', str(raw_json), flags=re.DOTALL).strip()\n\
          \        # 去掉 LLM 可能输出的 markdown 代码块包裹 ```json ... ```\n        cleaned\
          \ = re.sub(r'^```(?:json)?\\s*\\n?', '', cleaned, flags=re.MULTILINE)\n\
          \        cleaned = re.sub(r'\\n?```\\s*$', '', cleaned)\n        try:\n\
          \            parsed = json.loads(cleaned)\n            if isinstance(parsed,\
          \ dict):\n                data = parsed\n            elif isinstance(parsed,\
          \ list) and parsed:\n                data = parsed[0] if isinstance(parsed[0],\
          \ dict) else {}\n        except Exception:\n            data = {}\n\n  \
          \  # 标准化\n    result = {\n        \"name\": data.get(\"name\") or \"\",\n\
          \        \"id_card\": data.get(\"id_card\") or \"\",\n        \"birth_date\"\
          : normalize_date(data.get(\"birth_date\")),\n        \"party_join_date\"\
          : normalize_date(data.get(\"party_join_date\")),\n        \"work_start_date\"\
          : normalize_date(data.get(\"work_start_date\")),\n        \"education\"\
          : normalize_education(data.get(\"education\")),\n        \"degree\": normalize_degree(data.get(\"\
          degree\")),\n        \"position\": data.get(\"position\") or \"\",\n   \
          \     \"department\": data.get(\"department\") or \"\",\n        \"assessment_year\"\
          : normalize_year(data.get(\"assessment_year\")),\n        \"assessment_result\"\
          : normalize_assessment(data.get(\"assessment_result\")),\n    }\n    return\
          \ {\"normalized\": result}\n\n\ndef normalize_date(val):\n    if not val:\n\
          \        return \"\"\n    match = re.search(r\"(\\d{4})[-/.](\\d{1,2})[-/.](\\\
          d{1,2})\", str(val))\n    if match:\n        return f\"{match.group(1)}-{match.group(2).zfill(2)}-{match.group(3).zfill(2)}\"\
          \n    match = re.search(r\"(\\d{4})年(\\d{1,2})月(\\d{1,2})日\", str(val))\n\
          \    if match:\n        return f\"{match.group(1)}-{match.group(2).zfill(2)}-{match.group(3).zfill(2)}\"\
          \n    match = re.search(r\"(\\d{4})年(\\d{1,2})月\", str(val))\n    if match:\n\
          \        return f\"{match.group(1)}-{match.group(2).zfill(2)}-01\"\n   \
          \ return str(val)\n\n\ndef normalize_education(val):\n    if not val:\n\
          \        return \"\"\n    edu_map = {\n        \"博士\": \"博士\",\n       \
          \ \"博士后\": \"博士\",\n        \"硕士\": \"硕士\",\n        \"研究生\": \"硕士\",\n\
          \        \"本科\": \"本科\",\n        \"大学\": \"本科\",\n        \"大专\": \"大专\"\
          ,\n        \"专科\": \"大专\",\n        \"中专\": \"中专\",\n        \"高中\": \"\
          高中及以下\",\n    }\n    for key in edu_map:\n        if key in str(val):\n\
          \            return edu_map[key]\n    return str(val)\n\n\ndef normalize_degree(val):\n\
          \    if not val:\n        return \"\"\n    s = str(val)\n    if \"博士\" in\
          \ s:\n        return \"博士\"\n    if \"硕士\" in s:\n        return \"硕士\"\n\
          \    if \"学士\" in s:\n        return \"学士\"\n    return \"无\"\n\n\ndef normalize_year(val):\n\
          \    if not val:\n        return \"\"\n    match = re.search(r\"(\\d{4})\"\
          , str(val))\n    return match.group(1) if match else \"\"\n\n\ndef normalize_assessment(val):\n\
          \    if not val:\n        return \"\"\n    val = str(val)\n    if \"优秀\"\
          \ in val:\n        return \"优秀\"\n    if \"称职\" in val and \"基本\" not in\
          \ val:\n        return \"称职\"\n    if \"基本称职\" in val:\n        return \"\
          基本称职\"\n    if \"不称职\" in val:\n        return \"不称职\"\n    return val"
        code_language: python3
        outputs:
          normalized:
            children: null
            type: object
