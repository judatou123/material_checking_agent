          text: '你是一名干部人事档案管理专家。请根据以下材料内容，判断它属于哪种类型的档案材料。



            请从以下选项中选择唯一一个最匹配的类型：

            - 履历表：包含个人基本信息、学习经历、工作经历等完整履历

            - 任免表：包含职务任免信息、发文单位、任免时间

            - 考核表：包含考核年度、考核等次、评语

            - 学历材料：包含毕业院校、专业、学历学位

            - 奖惩材料：包含奖励/处分名称、颁发单位、时间

            - 政审材料：包含政治审查内容、家庭成员信息

            - 其他



            输出要求：

            - 只输出类型名称（如"履历表"），不要输出任何其他文字

            - 不要解释，不要加标点'
