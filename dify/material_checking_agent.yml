    - data:
        code: "import json\n\ndef main(material_type: str, normalized) -> dict:\n\
          \    # 兼容：Dify 有时将 object 序列化为 JSON 字符串\n    person = normalized\n    if\
          \ isinstance(person, str) and person.strip():\n        try:\n          \
          \  person = json.loads(person)\n        except Exception:\n            person\
          \ = {}\n\n    # 兼容旧格式 {\"people\": [{...}]}\n    if isinstance(person, dict)\
          \ and \"people\" in person:\n        people_list = person.get(\"people\"\
          , [])\n        person = people_list[0] if people_list else {}\n\n    if\
          \ not isinstance(person, dict):\n        person = {}\n\n    lines = [\n\
          \        \"=\" * 50,\n        \"档案材料 AI 提取结果\",\n        \"=\" * 50,\n \
          \       \"\",\n        f\"材料类型：{material_type or '未知'}\",\n        \"\"\
          ,\n        \"结构化字段：\",\n        f\"  姓名：{person.get('name') or '—'}\",\n\
          \        f\"  身份证号：{person.get('id_card') or '—'}\",\n        f\"  出生日期：{person.get('birth_date')\
          \ or '—'}\",\n        f\"  入党时间：{person.get('party_join_date') or '—'}\"\
          ,\n        f\"  参加工作时间：{person.get('work_start_date') or '—'}\",\n     \
          \   f\"  最高学历：{person.get('education') or '—'}\",\n        f\"  最高学位：{person.get('degree')\
          \ or '—'}\",\n        f\"  现任职务：{person.get('position') or '—'}\",\n   \
          \     f\"  工作单位：{person.get('department') or '—'}\",\n        f\"  考核年度：{person.get('assessment_year')\
          \ or '—'}\",\n        f\"  考核等次：{person.get('assessment_result') or '—'}\"\
          ,\n        \"\",\n        \"JSON（便于对接系统）：\",\n        json.dumps(person,\
          \ ensure_ascii=False, indent=2),\n        \"\",\n        \"=\" * 50,\n \
          \   ]\n    return {\"report\": \"\\n\".join(lines)}"
        code_language: python3
