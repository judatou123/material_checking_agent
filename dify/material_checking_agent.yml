    - data:
        code: "\ndef main(scenario: str) -> dict:\n    # 5 套审核标准（精简版，完整版之前已逐套给出）\n\
          \    prompts = {\n        \"1\": {\n            \"name\": \"干部选拔任用\",\n\
          \            \"prompt\": \"\"\"## 审核标准：干部选拔任用\n\n### 三龄两历一身份\n从最早原始材料逐一核对出生时间、参加工作时间、入党时间，交叉比对多份材料是否一致。\n\
          不一致时分析是否得利（如改大年龄提前上学/入党，改小年龄延长任期）。\n核查全日制及在职学历学位、主要工作经历、干部身份（公务员/参公/事业/国企）。\n\
          \n### 任职资格条件\n现职级及任职年限，对照选拔任用条例判断是否达到提拔要求。\n查阅第八类材料，排查是否在处分影响期内或有违纪违法问题。\n\
          \n### 档案真实性\n逐份检查关键字段涂改痕迹。比对不同材料间出生日期/学历/工作时间是否矛盾。\n勾选关键材料：□任免审批表 □公务员登记表\
          \ □入党志愿书 □干部履历表 □学历学位证书 □近3年考核表\n\n### 专项审核状态\n是否有专审认定表，认定信息与现任职务是否一致。\"\
          \"\"},\n        \"2\": {\n            \"name\": \"新进人员入职\",\n          \
          \  \"prompt\": \"\"\"## 审核标准：新进人员入职\n\n### 进入来源材料\n依据进入方式（招录/调任/转业/招聘）核查对应材料是否齐全、印章完整、审批链清晰。\n\
          \n### 干部身份认定\n依据进入时间节点的政策（统招统分/转干/聘用制/公务员制度），判断身份认定是否有效。\n\n### 三龄两历原始依据\n\
          出生时间最早记载→入团志愿书、初中毕业生登记表。\n参加工作时间最早证明→招工表、入伍通知书。\n入党时间→入党志愿书原件。\n学历学位→各阶段报考表、成绩单、毕业生登记表、学位证书全套。\n\
          \n### 档案完整性\n缺失材料是否已补充或说明。\"\"\"},\n        \"3\": {\n            \"name\"\
          : \"干部档案转递\",\n            \"prompt\": \"\"\"## 审核标准：干部档案转递\n\n### 分类与完整\n\
          十大分类是否合理，有无非档案材料（私人信件、笔记本、草稿）混入。\n\n### 转递手续\n转递通知单、目录清单、密封章、交接签字、转递登记簿、回执单，六项是否完备。\n\
          \n### 三龄两历一致性\n转出前认定结果与档案记载是否一致，不一致是否有情况说明。\n\n### 涉密违禁排查\n有无私人信件、笔记本、涉密文件混入。\"\
          \"\"},\n        \"4\": {\n            \"name\": \"专项审核集中整治\",\n        \
          \    \"prompt\": \"\"\"## 审核标准：专项审核集中整治\n\n### 最早依据原则\n三龄认定必须以最早原始材料为准。逐项追溯到第一次记载，比对后续变化。\n\
          \n### 涂改与造假\n检查出生日期、工作时间关键字段是否有刮擦/涂改液/重描痕迹。\n得利分析：改动是否对当事人有利（提前上学、延长任期）。\n\
          排查套读学历、冒名证书、伪造证件。\n\n### 缺失补全\n列出缺失清单及重要程度（★★★关键/★★重要/★一般），给出补全渠道和替代方案。\n\
          \n### 违规违纪\n\U0001F534严重（伪造/冒名）、\U0001F7E0较重（多处涂改得利/套读）、\U0001F7E1一般，形成问题线索和处置建议。\"\
          \"\"},\n        \"5\": {\n            \"name\": \"日常材料归档\",\n          \
          \  \"prompt\": \"\"\"## 审核标准：日常材料归档\n\n### 真实性\n印章、签名、日期是否齐全真实。有无伪造或涂改痕迹。\n\
          \n### 规范性与时效性\n格式是否符合要求（A4纸），是否在材料形成后1年内归档。\n\n### 逻辑一致性\n新材料关键时间与已认定档案信息是否一致。不一致需核查是新认定还是错误。\n\
          \n### 重复材料\n与已有归档材料是否重复，非归档范围材料不得归入。\"\"\"},\n    }\n\n    info = prompts.get(scenario.strip(),\
          \ prompts[\"1\"])\n\n    return {\n        \"audit_prompt\": info[\"prompt\"\
          ],\n        \"scenario_name\": info[\"name\"],\n    }\n\n"
